name: Render Terraform PR Comment
description: 'Format a terraform plan or apply log into a PR comment body'

inputs:
  mode:
    description: "Either 'plan' or 'apply' (default: apply)"
    required: false
    default: 'apply'
  directory:
    description: 'Environment directory (e.g. preview, production)'
    required: true
  config_path:
    description: 'Path to .terraform-ci.yaml (apply only)'
    required: false
    default: '.terraform-ci.yaml'
  state_path:
    description: 'Path to `terraform show -json` output (apply only, omitted on failure)'
    required: false
  console_path:
    description: 'Path to the captured terraform plan/apply console log'
    required: true
  duration:
    description: 'Run duration in seconds (success only)'
    required: false
  cmd:
    description: 'Terraform command string (success only)'
    required: false
  job_status:
    description: 'Job status: success or failure'
    required: true
  body_path:
    description: 'If set, write the rendered body to this file path (recommended for large bodies that may exceed action output size limits)'
    required: false

outputs:
  body:
    description: 'The rendered comment body (only set when body_path is empty)'
    value: ${{ steps.render.outputs.body }}
  body_path:
    description: 'Path to the file containing the rendered body (only set when body_path input is provided)'
    value: ${{ steps.render.outputs.body_path }}

runs:
  using: composite
  steps:
    - name: Render comment body
      id: render
      shell: bash
      env:
        INPUT_MODE: ${{ inputs.mode }}
        INPUT_DIRECTORY: ${{ inputs.directory }}
        INPUT_CONFIG_PATH: ${{ inputs.config_path }}
        INPUT_STATE_PATH: ${{ inputs.state_path }}
        INPUT_CONSOLE_PATH: ${{ inputs.console_path }}
        INPUT_DURATION: ${{ inputs.duration }}
        INPUT_CMD: ${{ inputs.cmd }}
        INPUT_JOB_STATUS: ${{ inputs.job_status }}
        INPUT_BODY_PATH: ${{ inputs.body_path }}
      run: |
        node "${{ github.action_path }}/dist/index.js"
