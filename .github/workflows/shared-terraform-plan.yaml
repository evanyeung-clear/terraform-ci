name: Terraform Plan

on:
  workflow_call:
    inputs:
      runner:
        description: "Runner to use"
        required: false
        default: "ubuntu-latest"
        type: string
      directory:
        description: "Directory to run Terraform in"
        required: true
        type: string
      vars_file:
        description: "Optional path to Terraform variables file relative to the directory"
        required: false
        type: string
    secrets:
      sops_age_key:
        description: "Optional if you need to decode the variables file with SOPS"
        required: false

jobs:
  plan:
    runs-on: ${{ inputs.runner }}
    permissions:
      pull-requests: write
      statuses: write
      packages: read
    defaults:
      run:
        working-directory: ${{ inputs.directory }}

    steps:
      - name: Checkout pull request
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.head_ref }}

      - name: Decrypt Terraform variables
        id: decrypt
        uses: ./.github/shared-actions/decrypt-sops
        if: inputs.vars_file != '' && env.SOPS_AGE_KEY != ''
        env:
          SOPS_AGE_KEY: ${{ secrets.sops_age_key }}
        with:
          working_directory: ${{ inputs.directory }}
          input_file: ${{ inputs.vars_file }}
          output_file: terraform.tfvars.json
          sops_age_key: ${{ secrets.sops_age_key }}

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull Terraform Docker image
        run: docker compose pull terraform-ci

      # if lock is active, use speculative state
      - name: Get PR and commit SHA
        id: pr
        uses: actions/github-script@v8
        with:
          script: |
            const { data: pr } = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number
            });

            // core.setOutput("head_sha", pr.head.sha);
            core.setOutput("branch", pr.head.ref);
            // core.setOutput("mergeable_state", pr.mergeable_state);

      - name: Check deployment lock
        uses: forevanyeung/lock@e43a0b2920fca2eb45f02bde126d32e09949d419
        id: lock
        with:
          mode: check
          environment: ${{ inputs.directory }}

      - name: Check if lock is for this branch
        if: steps.lock.outputs.locked == 'true'
        uses: actions/github-script@v8
        id: lock-check
        with:
          script: |
            const lockedBranch = `${{ steps.lock.outputs.branch }}`;
            const currentBranch = `${{ steps.pr.outputs.branch }}`;
            console.log(`Locked branch: ${lockedBranch}, Current branch: ${currentBranch}`);

            // Check if the lock is held by this branch
            if (lockedBranch === currentBranch) {
              console.log('Lock is held by this branch, continuing.');
              core.setOutput("locked", "false");
            } else {
              console.log(`Lock is held by branch ${lockedBranch}, using speculative state.`);
              core.setOutput("locked", "true");
            }

      - name: Init, fmt, validate
        uses: ./.github/shared-actions/tf-setup
        with:
          directory: ${{ inputs.directory }}
          spec_plan: ${{ steps.lock-check.outputs.locked == 'true' && 'true' || '' }}
          TF_TOKEN_APP_TERRAFORM_IO: ${{ secrets.TF_TOKEN_APP_TERRAFORM_IO }}
          TF_CLOUD_ORGANIZATION: ${{ secrets.TF_CLOUD_ORGANIZATION }}
          post_review: "true"

      # Run a discovery plan to a binary file then `show -json` to get a full
      # plan with before/after attribute values, which the classifier needs
      # for attribute-level mixed-import detection.
      - name: Run discovery plan
        env:
          SPEC_PLAN: ${{ steps.lock-check.outputs.locked == 'true' && 'true' || '' }}
          TF_TOKEN_APP_TERRAFORM_IO: ${{ secrets.TF_TOKEN_APP_TERRAFORM_IO }}
          TF_CLOUD_ORGANIZATION: ${{ secrets.TF_CLOUD_ORGANIZATION }}
        run: |
          docker compose run --rm terraform-ci plan -refresh=false -out=tfplan
          docker compose run --rm terraform-ci show -json tfplan > plan.json

      - name: Classify plan
        id: targets
        uses: ./.github/shared-actions/classify-tf-plan
        with:
          plan_file: ${{ inputs.directory }}/plan.json
          config_file: ${{ inputs.directory }}/.terraform-ci.yaml

      # TODO: skip plan and apply if no changes found

      - name: Run Terraform Plan
        id: plan
        env:
          SPEC_PLAN: ${{ steps.lock-check.outputs.locked == 'true' && 'true' || '' }}
          TF_TOKEN_APP_TERRAFORM_IO: ${{ secrets.TF_TOKEN_APP_TERRAFORM_IO }}
          TF_CLOUD_ORGANIZATION: ${{ secrets.TF_CLOUD_ORGANIZATION }}
        run: |
          set +e  # Disable immediate exit on error to handle errors gracefully
          status=0

          # Build terraform plan command based on vars file and SOPS usage
          cmd="terraform-ci plan -no-color -input=false"

          # Only target resources that are modified in code
          targets=${{ steps.targets.outputs.targets }}
          echo "Targets: $targets"
          cmd="$cmd $targets"

          echo "Terraform command: $cmd"

          start=$(date +%s)
          # Run terraform plan and capture output
          docker compose run --rm $cmd 2>&1 | tee tf.console.txt
          status=${PIPESTATUS[0]}
          end=$(date +%s)

          echo "duration=$((end - start))" >> $GITHUB_OUTPUT
          echo "cmd=$cmd" >> $GITHUB_OUTPUT

          if [ $status -ne 0 ]; then
            echo "Terraform plan failed"
            exit $status
          fi

      - name: Render Terraform plan comment
        id: render
        uses: ./.github/shared-actions/render-tf-comment
        with:
          mode: plan
          directory: ${{ inputs.directory }}
          console_path: ${{ inputs.directory }}/tf.console.txt
          duration: ${{ steps.plan.outputs.duration }}
          cmd: ${{ steps.plan.outputs.cmd }}
          job_status: ${{ job.status }}
          body_path: ${{ inputs.directory }}/tf.comment.md
          mixed_import: ${{ steps.targets.outputs.is_mixed_import }}

      - name: Mark previous comments outdated
        if: steps.targets.outputs.has_changes == 'true'
        uses: actions/github-script@v8
        with:
          script: |
            async function markOutdated(search, notice) {
              const comments = await github.rest.issues.listComments({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                per_page: 100
              });

              for (const comment of comments.data) {
                if (comment.body && comment.body.includes(search) && !comment.body.includes(notice)) {
                  const quotedBody = comment.body.split('\n').map(line => '> ' + line).join('\n');
                  await github.rest.issues.updateComment({
                    comment_id: comment.id,
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    body: '<details><summary>' + notice + '</summary>\n\n' + quotedBody + '\n</details>'
                  });

                  const mutation = `mutation($subjectId:ID!, $classifier:ReportedContentClassifiers!) {
                    minimizeComment(input: { subjectId: $subjectId, classifier: $classifier }) {
                      clientMutationId
                      minimizedComment {
                        isMinimized
                        minimizedReason
                        viewerCanMinimize
                      }
                    }
                  }`;

                  console.log(`Hiding comment ${comment.id} (${comment.node_id})`);
                  const result = await github.graphql(mutation, {
                    subjectId: comment.node_id,
                    classifier: 'OUTDATED'
                  });
                  console.log(result);
                }
              }
            }

            const planCommentTag = `**Terraform plan** (Okta ${{ inputs.directory }})`;
            await markOutdated(planCommentTag, 'This plan is out of date. A new plan has been performed.');
            const applyCommentTag = `**Terraform apply** (Okta ${{ inputs.directory }})`;
            await markOutdated(applyCommentTag, 'This apply is out of date. A new apply has been performed.');

      - name: Comment Terraform Plan
        uses: actions/github-script@v8
        with:
          script: |
            const fs = require('fs');
            const body = fs.readFileSync('${{ steps.render.outputs.body_path }}', 'utf8');
            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body
            });

      - name: Add help to apply commit status
        uses: actions/github-script@v8
        with:
          script: |
            const hasChanges = '${{ steps.targets.outputs.has_changes }}';
            github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha: "${{ github.event.pull_request.head.sha }}",
              state: hasChanges === 'true' ? "pending" : "success",
              context: "terraform-apply",
              description: hasChanges === 'true'
                ? "Comment \"/terraform apply\" to deploy changes"
                : "No changes detected",
            });

      # Fail the job AFTER the comment has been posted, so the PR shows the
      # full plan output plus the mixed-import warning.
      - name: Fail on mixed-import PR
        if: steps.targets.outputs.is_mixed_import == 'true'
        run: |
          echo "::error::PRs containing import operations must contain only imports (no creates, updates, or deletes). See the plan comment for details."
          exit 1

  test:
    runs-on: ${{ inputs.runner }}
    permissions:
      contents: read
      security-events: write
      actions: read
      pull-requests: read

    steps:
      - name: Checkout pull request
        uses: actions/checkout@v4

      - name: Check for trivy config
        id: trivy-config
        run: |
          if [ -f "trivy.yaml" ]; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Run Trivy scan
        if: steps.trivy-config.outputs.exists == 'true'
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1 #v0.35.0
        with:
          version: v0.69.3
          trivy-config: trivy.yaml
          scan-type: 'config'
          scan-ref: ${{ inputs.directory }}
          format: 'sarif'
          output: 'trivy-results.sarif'
          exit-code: '0'

      - name: Rewrite SARIF uri
        if: steps.trivy-config.outputs.exists == 'true' && always()
        working-directory: ${{ github.workspace }}
        run: |
          REPO_ROOT="${{ github.workspace }}"
          INPUT="trivy-results.sarif"
          REWRITTEN="$(jq --arg repo_root "$REPO_ROOT" '
            .runs |= map(
              (.originalUriBaseIds // {}) as $bases |
              .results |= map(
                .locations |= map(
                  if .physicalLocation.artifactLocation.uriBaseId != null then
                    (.physicalLocation.artifactLocation.uriBaseId) as $id |
                    if $bases[$id] != null then
                      ($bases[$id].uri | ltrimstr("file://")) as $base_path |
                      (if ($base_path | startswith($repo_root + "/"))
                       then $base_path | ltrimstr($repo_root + "/")
                       else $base_path | ltrimstr("/")
                       end) as $rel_base |
                      .physicalLocation.artifactLocation |= {
                        "uri": ($rel_base + .uri)
                      }
                    else . end
                  else . end
                )
              )
            )
          ' "$INPUT")"
          echo "$REWRITTEN" > "$INPUT"

      - name: Upload Trivy scan results to GitHub Security tab
        if: steps.trivy-config.outputs.exists == 'true' && always()
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: 'trivy-results.sarif'

      - name: Fail on findings in changed files
        if: steps.trivy-config.outputs.exists == 'true'
        uses: actions/github-script@v8
        with:
          script: |
            const fs = require('fs');

            const { data: prFiles } = await github.rest.pulls.listFiles({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.payload.pull_request.number
            });

            const changedFiles = new Set(
              prFiles
                .filter(f => f.status !== 'removed' && f.filename.startsWith('${{ inputs.directory }}/'))
                .map(f => f.filename)
            );

            if (changedFiles.size === 0) {
              core.info('No files changed in ${{ inputs.directory }} — skipping Trivy block');
              return;
            }

            const sarif = JSON.parse(fs.readFileSync('trivy-results.sarif', 'utf8'));

            const findings = sarif.runs.flatMap(run =>
              (run.results || []).filter(result =>
                (result.locations || []).some(loc => {
                  const uri = loc.physicalLocation?.artifactLocation?.uri;
                  return uri && changedFiles.has(uri);
                })
              )
            );

            if (findings.length > 0) {
              core.setFailed(`Trivy found ${findings.length} finding(s) in changed files. See the Security tab for details.`);
            } else {
              core.info(`No Trivy findings in ${changedFiles.size} changed file(s)`);
            }
