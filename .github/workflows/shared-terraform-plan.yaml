name: Terraform Plan

on:
  workflow_call:
    inputs:
      runner:
        description: "Runner to use"
        required: false
        default: "ubuntu-latest"
        type: string
      directory:
        description: "Directory to run Terraform in"
        required: true
        type: string
      vars_file:
        description: "Optional path to Terraform variables file relative to the directory"
        required: false
        type: string
    secrets:
      sops_age_key:
        description: "Optional if you need to decode the variables file with SOPS"
        required: false

jobs:
  plan:
    runs-on: ${{ inputs.runner }}
    permissions:
      pull-requests: write
      statuses: write
      packages: read
    defaults:
      run:
        working-directory: ${{ inputs.directory }}

    steps:
      - name: Checkout pull request
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.head_ref }}

      - name: Decrypt Terraform variables
        id: decrypt
        uses: ./.github/shared-actions/decrypt-sops
        if: inputs.vars_file != '' && env.SOPS_AGE_KEY != ''
        env:
          SOPS_AGE_KEY: ${{ secrets.sops_age_key }}
        with:
          working_directory: ${{ inputs.directory }}
          input_file: ${{ inputs.vars_file }}
          output_file: terraform.tfvars.json
          sops_age_key: ${{ secrets.sops_age_key }}

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull Terraform Docker image
        run: docker compose pull terraform-ci

      # if lock is active, use speculative state
      - name: Get PR and commit SHA
        id: pr
        uses: actions/github-script@v7
        with:
          script: |
            const { data: pr } = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number
            });

            // core.setOutput("head_sha", pr.head.sha);
            core.setOutput("branch", pr.head.ref);
            // core.setOutput("mergeable_state", pr.mergeable_state);

      - name: Check deployment lock
        uses: forevanyeung/lock@e43a0b2920fca2eb45f02bde126d32e09949d419
        id: lock
        with:
          mode: check
          environment: ${{ inputs.directory }}

      - name: Check if lock is for this branch
        if: steps.lock.outputs.locked == 'true'
        uses: actions/github-script@v7
        id: lock-check
        with:
          script: |
            const lockedBranch = `${{ steps.lock.outputs.branch }}`;
            const currentBranch = `${{ steps.pr.outputs.branch }}`;
            console.log(`Locked branch: ${lockedBranch}, Current branch: ${currentBranch}`);

            // Check if the lock is held by this branch
            if (lockedBranch === currentBranch) {
              console.log('Lock is held by this branch, continuing.');
              core.setOutput("locked", "false");
            } else {
              console.log(`Lock is held by branch ${lockedBranch}, using speculative state.`);
              core.setOutput("locked", "true");
            }

      - name: Initialize Terraform
        id: init
        continue-on-error: true
        env:
          SPEC_PLAN: ${{ steps.lock-check.outputs.locked == 'true' && 'true' || '' }}
          TF_TOKEN_APP_TERRAFORM_IO: ${{ secrets.TF_TOKEN_APP_TERRAFORM_IO }}
          TF_CLOUD_ORGANIZATION: ${{ secrets.TF_CLOUD_ORGANIZATION }}
        run: |
          docker compose run --rm terraform-ci init -input=false -no-color 2>&1 | tee init.output.txt
          exit ${PIPESTATUS[0]}

      - name: Check Terraform Formatting
        id: fmt
        if: steps.init.outcome == 'success'
        continue-on-error: true
        run: |
          docker compose run --rm terraform-ci fmt -check -diff -no-color 2>&1 | tee fmt.output.txt
          exit ${PIPESTATUS[0]}

      - name: Validate Terraform Configuration
        id: validate
        if: steps.init.outcome == 'success'
        continue-on-error: true
        run: |
          docker compose run --rm terraform-ci validate -no-color 2>&1 | tee validate.output.txt
          exit ${PIPESTATUS[0]}

      - name: Dismiss stale review
        if: steps.init.outcome == 'success' && steps.fmt.outcome == 'success' && steps.validate.outcome == 'success'
        uses: actions/github-script@v7
        with:
          script: |
            const reviews = await github.rest.pulls.listReviews({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number,
            });

            for (const review of reviews.data) {
              if (review.state === 'CHANGES_REQUESTED' && review.user.type === 'Bot') {
                await github.rest.pulls.dismissReview({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  pull_number: context.issue.number,
                  review_id: review.id,
                  message: 'Formatting and validation checks now pass.',
                });
              }
            }

      - name: Comment init/fmt/validate errors
        if: steps.init.outcome == 'failure' || steps.fmt.outcome == 'failure' || steps.validate.outcome == 'failure'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const directory = '${{ inputs.directory }}';

            function safeRead(p) {
              try { return fs.readFileSync(p, 'utf8').trim(); } catch(e) { return ''; }
            }

            const initOutput     = safeRead(`${directory}/init.output.txt`);
            const fmtOutput      = safeRead(`${directory}/fmt.output.txt`);
            const validateOutput = safeRead(`${directory}/validate.output.txt`);
            const initFailed     = '${{ steps.init.outcome }}'     === 'failure';
            const fmtFailed      = '${{ steps.fmt.outcome }}'      === 'failure';
            const validateFailed = '${{ steps.validate.outcome }}' === 'failure';

            // Build review body (used as fallback if inline comments can't be posted)
            let reviewBody = '';
            if (initFailed) {
              reviewBody += `### ❌ \`terraform init\` failed\n\n\`\`\`\n${initOutput}\n\`\`\`\n\n`;
            }
            if (fmtFailed) {
              reviewBody += `### ❌ \`terraform fmt\` failed\n\nRun \`terraform fmt\` to fix formatting issues.\n\n\`\`\`diff\n${fmtOutput}\n\`\`\`\n\n`;
            }
            if (validateFailed) {
              reviewBody += `### ❌ \`terraform validate\` failed\n\n\`\`\`\n${validateOutput}\n\`\`\`\n`;
            }

            // Load source map so _consolidated.tf lines resolve to original files
            let sourceMap = [];
            try {
              const sourceMapRaw = safeRead(`${directory}/_consolidated_source_map.json`);
              if (sourceMapRaw) sourceMap = JSON.parse(sourceMapRaw);
            } catch(e) {
              core.warning(`Could not parse source map: ${e.message}`);
            }

            function resolveConsolidated(lineNum) {
              for (const entry of sourceMap) {
                if (lineNum >= entry.consolidated_start &&
                    lineNum <  entry.consolidated_start + entry.line_count) {
                  return {
                    path: `${directory}/${entry.source_file}`,
                    line: lineNum - entry.consolidated_start + 1
                  };
                }
              }
              return null;
            }

            // Parse "on <file> line N" error references from init/validate output.
            // Resolves _consolidated.tf lines back to the original source file via the source map.
            function parseErrorComments(output, label) {
              const comments = [];
              const pattern = /on\s+(\S+\.tf)\s+line\s+(\d+)/g;
              const seen = new Set();
              let m;

              while ((m = pattern.exec(output)) !== null) {
                const rawFile = m[1];
                const rawLine = parseInt(m[2]);

                let targetPath, targetLine;
                if (rawFile === '_consolidated.tf') {
                  const resolved = resolveConsolidated(rawLine);
                  if (!resolved) continue;
                  targetPath = resolved.path;
                  targetLine = resolved.line;
                } else {
                  targetPath = `${directory}/${rawFile}`;
                  targetLine = rawLine;
                }

                const key = `${targetPath}:${targetLine}`;
                if (seen.has(key)) continue;
                seen.add(key);

                const allLines = output.split('\n');
                const locStr = `on ${rawFile} line ${rawLine}`;
                const idx = allLines.findIndex(l => l.includes(locStr));
                let errorMsg = `\`${label}\` error at this line.`;
                if (idx >= 0) {
                  const ctx = allLines.slice(Math.max(0, idx - 1), Math.min(allLines.length, idx + 4)).join('\n');
                  errorMsg = `\`${label}\` error:\n\`\`\`\n${ctx}\n\`\`\``;
                }

                comments.push({ path: targetPath, line: targetLine, side: 'RIGHT', body: errorMsg });
              }
              return comments;
            }

            // Parse fmt diff for inline review comments
            const reviewComments = [];

            if (fmtFailed && fmtOutput) {
              const lines = fmtOutput.split('\n');
              let isConsolidated = false;
              let currentFile = null;
              let newLineNum = 0;
              const commentedFiles = new Set();  // one comment per logical source file

              for (const line of lines) {
                if (line.startsWith('+++ ')) {
                  const m = line.match(/^\+\+\+ (?:[ab]\/|new\/)?(.+)/);
                  if (m) {
                    const name = m[1].trim();
                    isConsolidated = (name === '_consolidated.tf');
                    currentFile = isConsolidated ? null : `${directory}/${name}`;
                    newLineNum = 0;
                  }
                  continue;
                }
                if (line.startsWith('--- ')) continue;
                if (line.startsWith('@@ ')) {
                  const m = line.match(/@@ -\d+(?:,\d+)? \+(\d+)/);
                  if (m) newLineNum = parseInt(m[1]) - 1;
                  continue;
                }
                if (line.startsWith('+')) {
                  newLineNum++;
                  let targetPath, targetLine;
                  if (isConsolidated) {
                    const resolved = resolveConsolidated(newLineNum);
                    if (resolved) { targetPath = resolved.path; targetLine = resolved.line; }
                  } else if (currentFile) {
                    targetPath = currentFile;
                    targetLine = newLineNum;
                  }
                  if (targetPath && !commentedFiles.has(targetPath)) {
                    commentedFiles.add(targetPath);
                    reviewComments.push({
                      path: targetPath,
                      line: targetLine,
                      side: 'RIGHT',
                      body: '`terraform fmt` would reformat this area. Run `terraform fmt` to auto-fix.'
                    });
                  }
                } else if (line.startsWith('-')) {
                  // removed line — do not advance new-file line counter
                } else {
                  newLineNum++;
                }
              }
            }

            if (initFailed)     reviewComments.push(...parseErrorComments(initOutput,     'terraform init'));
            if (validateFailed) reviewComments.push(...parseErrorComments(validateOutput, 'terraform validate'));

            // Submit PR review with REQUEST_CHANGES
            const commitId = context.payload.pull_request.head.sha;
            const inlineReviewBody = reviewComments.length > 0
              ? '❌ Terraform checks failed. See the inline comments for the specific lines that need fixing.'
              : reviewBody.trim();

            try {
              await github.rest.pulls.createReview({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: context.issue.number,
                commit_id: commitId,
                event: 'REQUEST_CHANGES',
                body: inlineReviewBody,
                comments: reviewComments
              });
            } catch (e) {
              core.warning(`Could not post inline review comments (lines may not be in the diff): ${e.message}`);
              await github.rest.pulls.createReview({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: context.issue.number,
                commit_id: commitId,
                event: 'REQUEST_CHANGES',
                body: reviewBody.trim()
              });
            }

            core.setFailed(fmtFailed ? 'terraform fmt check failed' : 'terraform validate failed');

      - name: Get Changed Terraform Targets
        id: targets
        env:
          SPEC_PLAN: ${{ steps.lock-check.outputs.locked == 'true' && 'true' || '' }}
          TF_TOKEN_APP_TERRAFORM_IO: ${{ secrets.TF_TOKEN_APP_TERRAFORM_IO }}
          TF_CLOUD_ORGANIZATION: ${{ secrets.TF_CLOUD_ORGANIZATION }}
        run: |
          docker compose run --rm terraform-ci plan -refresh=false -json | jq -rs '[.[] | .change.resource.addr | select(.!=null) | "-target=\(.)"] | join(" ")' > targets.txt
          echo "targets='$(cat targets.txt)'" >> $GITHUB_OUTPUT

      # TODO: skip plan and apply if no changes found

      - name: Run Terraform Plan
        id: plan
        env:
          SPEC_PLAN: ${{ steps.lock-check.outputs.locked == 'true' && 'true' || '' }}
          TF_TOKEN_APP_TERRAFORM_IO: ${{ secrets.TF_TOKEN_APP_TERRAFORM_IO }}
          TF_CLOUD_ORGANIZATION: ${{ secrets.TF_CLOUD_ORGANIZATION }}
        run: |
          set +e  # Disable immediate exit on error to handle errors gracefully
          status=0

          # Build terraform plan command based on vars file and SOPS usage
          cmd="terraform-ci plan -no-color -input=false"

          # Only target resources that are modified in code
          targets=${{ steps.targets.outputs.targets }}
          echo "Targets: $targets"
          cmd="$cmd $targets"

          echo "Terraform command: $cmd"

          start=$(date +%s)
          # Run terraform plan and capture output
          docker compose run --rm $cmd 2>&1 | tee tf.console.txt
          status=${PIPESTATUS[0]}
          end=$(date +%s)

          echo "duration=$((end - start))" >> $GITHUB_OUTPUT
          echo "cmd=$cmd" >> $GITHUB_OUTPUT

          if [ $status -ne 0 ]; then
            echo "Terraform plan failed"
            exit $status
          fi

      - name: Format Terraform Plan Diff
        id: diff
        run: |
          # Strip extra lines from tf.console.txt
          awk '
            BEGIN {skip=0}
            /^Warning:/ {skip=1}
            skip && (/^Note that the -target option/ || /^The -target option/) {skip=2; next} skip==2 && NF==0 {skip=0; next}
            skip {next}
            {print}
          ' tf.console.txt | 
          awk '/^─────/,EOF {next} {print}' > tf.console.stripped.txt || true

          # Filter lines starting with "  # " and prepend diff-specific symbols based on specific keywords.
          # https://github.com/OP5dev/TF-via-PR
          grep '^  # ' tf.console.txt | sed \
            -e 's/^  # \(.* be created\)/+ \1/' \
            -e 's/^  # \(.* be destroyed\)/- \1/' \
            -e 's/^  # \(.* be updated\|.* be replaced\)/! \1/' \
            -e 's/^  # \(.* be read\)/~ \1/' \
            -e 's/^  # \(.*\)/# \1/' > tf.diff.txt || true

          # Grab the summary lines for the expand text
          awk '/^(Error:|Plan:|Apply complete!|No changes.|Success)/' tf.console.txt > tf.summary.txt

      - name: Comment Terraform Plan
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            // Helper function to safely read files with a default value
            function safeReadFile(filePath, defaultContent = '') {
              try {
                return fs.readFileSync(filePath, 'utf8');
              } catch (error) {
                console.log(`Warning: Could not read file ${filePath}: ${error.message}`);
                return defaultContent;
              }
            }

            // Helper function to mark previous comment as out of date
            async function markOutdated(search, notice) {
              const comments = await github.rest.issues.listComments({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                per_page: 100
              });

              for (const comment of comments.data) {
                if (comment.body && comment.body.includes(search) && !comment.body.includes(notice)) {
                  // Prepend '> ' to each line of comment.body for quoting
                  const quotedBody = comment.body.split('\n').map(line => '> ' + line).join('\n');
                  await github.rest.issues.updateComment({
                    comment_id: comment.id,
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    body: '<details><summary>' + notice + '</summary>\n\n' + quotedBody + '\n</details>'
                  });

                  // Hide comment
                  const mutation = `mutation($subjectId:ID!, $classifier:ReportedContentClassifiers!) {
                    minimizeComment(input: { subjectId: $subjectId, classifier: $classifier }) {
                      clientMutationId
                      minimizedComment {
                        isMinimized
                        minimizedReason
                        viewerCanMinimize
                      }
                    }
                  }`;

                  console.log(`Hiding comment ${comment.id} (${comment.node_id})`);

                  const result = await github.graphql(mutation, {
                    subjectId: comment.node_id,
                    classifier: 'OUTDATED'
                  });

                  console.log(result);
                }
              }
            }

            const runUrl = `https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const diff = safeReadFile('${{ inputs.directory }}/tf.diff.txt', 'No changes detected');
            const summary = safeReadFile('${{ inputs.directory }}/tf.summary.txt', 'View output for details');
            const cleanPlan = safeReadFile('${{ inputs.directory }}/tf.console.stripped.txt', 'No plan output available');

            // Find previous plan comment and mark as out of date
            const planCommentTag = `**Terraform plan** (Okta ${{ inputs.directory }})`;
            const planOutOfDateNotice = 'This plan is out of date. A new plan has been performed.';
            markOutdated(planCommentTag, planOutOfDateNotice);

            // Find previous apply comment and mark as out of date
            const applyCommentTag = `**Terraform apply** (Okta ${{ inputs.directory }})`;
            const applyOutOfDateNotice = 'This apply is out of date. A new apply has been performed.';
            markOutdated(applyCommentTag, applyOutOfDateNotice);

            var body = `
            **Terraform plan** (Okta ${{ inputs.directory }}) ran in [${{ steps.plan.outputs.duration }} seconds](${runUrl}).
            \`\`\`
            ${{ steps.plan.outputs.cmd }}
            \`\`\`

            #### Diff of changes
            \`\`\`diff
            ${diff}
            \`\`\`

            <details>
            <summary>${summary}</summary>

            \`\`\`
            ${cleanPlan}
            \`\`\`
            </details>
            `

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: body
            })

      - name: Add help to apply commit status
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha: "${{ github.event.pull_request.head.sha }}",
              state: "pending",
              context: "terraform-apply",
              description: "Comment \"/terraform apply\" to deploy changes",
            });

