# .terraform-ci.yaml
# Configuration for terraform-ci output rendering in PR comments.
#
# `outputs` maps a Terraform resource type to the list of attributes that
# should be displayed in the "Outputs" section of the apply comment.
# Resources whose type is not listed here will be omitted from the section.

outputs:
  okta_user:
    - id
    - login
  okta_group:
    - id
  okta_app_oauth:
    - client_id
  okta_app_saml:
    - id
    - metadata_url
mixed_import_allowed:
  okta_app_oauth:
    refresh_token_rotation: STATIC
    refresh_token_leeway: 0
    omit_secret: false
